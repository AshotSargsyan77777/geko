<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="main.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="header_wrap">
                <div class="header_logo"><img src="./img/logo.png" alt=""></div>
                <nav class="header_nav">
                    <ul class="header_navlist">
                        <li class="header_nav_item"><a href="#">About</a></li>
                        <li class="header_nav_item"><a href="#">Car</a></li>
                        <li class="header_nav_item"><a href="#">Become Partner</a></li>
                        <li class="header_nav_item"><a href="#">Terms & Conditions</a></li>
                        <li class="header_nav_item"><a href="#">Contact Us</a></li>
                    </ul>
                </nav>
            </div>
        </div>
    </header>
    <section class="hero">
        <div class="container">
            <div class="hero_wrap">
                <div class="hero_block">
                    <h1 class="hero_title">We Have Prepared a Car For Your Trip </h1>
                    <p class="hero_text">We have many types of cars that are ready for you to travel anywhere and anytime.</p>
                    <div class="hero_btns">
                        <a href="#" class="hero_search">Get In Touch</a>
                        <a href="#" class="hero_search">Our Car</a>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <section class="brands">
        <div class="container">
            <div class="brands_wrap">
                <img src="./cars/BMW.png" alt="BMW">
                <img src="./cars/Honda.png" alt="HONDA">
                <img src="./cars/Hyundai.png" alt="HYUNDAI">
                <img src="./cars/KIA.png" alt="KIA">
                <img src="./cars/lexus-logo.png" alt="LEXUS">
                <img src="./cars/Marcedes.png" alt="MERCEDES">
                <img src="./cars/Nissan.png" alt="NISSAN">
                <img src="./cars/Toyota.png" alt="TOYOTA">
            </div>
        </div>
    </section>
</body>
</html>
